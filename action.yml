name: "CordCloud Action"
description: "GitHub Action for CordCloud"
author: "yanglbme"
branding:
  icon: "check-circle"
  color: "gray-dark"
inputs:
  email:
    description: "your cordcloud email"
    required: true
  passwd:
    description: "your cordcloud password"
    required: true
  secret:
    description: "your 2 step secret"
    required: false
  host:
    description: "base host"
    required: false
    default: "cordcloud.us,cordcloud.one,cordcloud.biz,c-cloud.xyz"
  imap_server:
    description: "IMAP server address (e.g., imap.qq.com, imap.163.com)"
    required: false
  auth_code:
    description: "Email authorization code (not login password)"
    required: false
outputs:
  result:
    description: "The result of api"
runs:
  using: "docker"
  image: "Dockerfile"
